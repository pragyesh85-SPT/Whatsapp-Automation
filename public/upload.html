<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#eaf0ff" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<title>Upload Answer Sheets</title>
<style>
  :root{--ink:#1f2937;--mut:#6b7280;--accent:#6366f1;--accent2:#8b5cf6;--hair:rgba(255,255,255,.75)}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;
    font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;color:var(--ink);
    background:linear-gradient(160deg,#eef2ff 0%,#fdeef6 48%,#e4f4ff 100%);background-attachment:fixed;position:relative;overflow-x:hidden}
  body::before,body::after{content:"";position:fixed;z-index:-1;filter:blur(70px);opacity:.55;border-radius:50%}
  body::before{width:70vw;height:70vw;background:radial-gradient(circle,#a5b4fc,#c4b5fd 60%,transparent 70%);top:-25vw;left:-25vw}
  body::after{width:70vw;height:70vw;background:radial-gradient(circle,#fbcfe8,#bae6fd 60%,transparent 70%);bottom:-25vw;right:-25vw}
  .card{width:100%;max-width:440px;border-radius:26px;padding:26px;
    background:rgba(255,255,255,.55);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);
    border:1px solid var(--hair);box-shadow:0 12px 40px rgba(60,70,120,.18)}
  .logo{width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:14px;box-shadow:0 6px 18px rgba(99,102,241,.4)}
  h1{font-size:21px;margin:0 0 4px;letter-spacing:-.01em} p.sub{color:var(--mut);margin:0 0 18px;font-size:14px}
  label{font-size:13px;color:var(--mut);font-weight:600;display:block;margin-top:8px}
  input[type=file]{width:100%;padding:18px;border:2px dashed rgba(99,102,241,.35);border-radius:16px;background:rgba(255,255,255,.5);margin-top:8px}
  button{width:100%;margin-top:20px;border:0;border-radius:16px;padding:15px;font-size:16px;font-weight:700;color:#fff;cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 8px 22px rgba(99,102,241,.36)}
  button:disabled{opacity:.6}
  .ok{background:rgba(16,185,129,.14);color:#059669;padding:15px;border-radius:16px;margin-top:16px;font-weight:600}
  .err{background:rgba(239,68,68,.12);color:#dc2626;padding:15px;border-radius:16px;margin-top:16px;font-weight:600}
  #preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px} #preview img{width:74px;height:74px;object-fit:cover;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.1)}
  .tip{font-size:12.5px;color:#9aa3b2;margin-top:10px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">📄</div>
  <h1>Upload your answer sheets</h1>
  <p class="sub" id="ctx">Take clear, cropped photos of each page.</p>
  <form id="f">
    <label>Answer sheet photos (you can pick multiple)</label>
    <input id="files" name="sheets" type="file" accept="image/*" multiple capture="environment" required>
    <div id="preview"></div>
    <p class="tip">Tip: good light, flat page, one page per photo. Up to 10 images.</p>
    <button id="btn" type="submit">Submit for evaluation</button>
  </form>
  <div id="msg"></div>
</div>
<script>
  const qs=new URLSearchParams(location.search), exam=qs.get('exam'), student=qs.get('student');
  if(!exam||!student){ document.getElementById('ctx').textContent='⚠️ Open this page from the exam link sent on WhatsApp.'; }
  const files=document.getElementById('files'), preview=document.getElementById('preview');
  files.addEventListener('change',()=>{ preview.innerHTML=''; [...files.files].slice(0,10).forEach(f=>{const img=document.createElement('img');img.src=URL.createObjectURL(f);preview.appendChild(img);}); });
  document.getElementById('f').addEventListener('submit',async e=>{
    e.preventDefault(); const btn=document.getElementById('btn'), msg=document.getElementById('msg');
    if(!exam||!student){ msg.innerHTML='<div class="err">Missing exam/student link.</div>'; return; }
    btn.disabled=true; btn.textContent='Uploading…';
    const fd=new FormData(); fd.append('exam',exam); fd.append('student',student);
    [...files.files].slice(0,10).forEach(f=>fd.append('sheets',f));
    try{
      const r=await(await fetch('/api/submit',{method:'POST',body:fd})).json();
      msg.innerHTML=r.ok?'<div class="ok">✅ '+r.message+'</div>':'<div class="err">'+(r.error||'Failed')+'</div>';
      if(r.ok) document.getElementById('f').style.display='none';
    }catch(err){ msg.innerHTML='<div class="err">Upload failed. Check your connection.</div>'; }
    btn.disabled=false; btn.textContent='Submit for evaluation';
  });
</script>
</body>
</html>
