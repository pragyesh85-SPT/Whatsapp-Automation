<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Upload Answer Sheets</title>
<style>
  *{box-sizing:border-box} body{margin:0;font:16px/1.6 system-ui,Segoe UI,Roboto,sans-serif;background:#f4f6fb;color:#1a2230;display:flex;justify-content:center}
  .box{max-width:520px;width:100%;padding:24px}
  .card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 8px 30px rgba(20,30,60,.08)}
  h1{font-size:20px;margin:0 0 4px} p.sub{color:#6b7689;margin:0 0 18px;font-size:14px}
  label{font-size:13px;color:#6b7689;display:block;margin-top:12px}
  input[type=file]{width:100%;padding:14px;border:2px dashed #c7d0e0;border-radius:12px;background:#fafbff;margin-top:6px}
  button{width:100%;margin-top:18px;background:#4f8cff;color:#fff;border:0;border-radius:12px;padding:14px;font-size:16px;font-weight:600;cursor:pointer}
  button:disabled{opacity:.6} .ok{background:#e7f9ef;color:#1b8f54;padding:14px;border-radius:12px;margin-top:16px}
  .err{background:#fdeaea;color:#c0392b;padding:14px;border-radius:12px;margin-top:16px}
  #preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px} #preview img{width:70px;height:70px;object-fit:cover;border-radius:8px}
  .tip{font-size:12px;color:#9aa3b5;margin-top:8px}
</style>
</head>
<body>
<div class="box"><div class="card">
  <h1>📄 Upload your answer sheets</h1>
  <p class="sub" id="ctx">Take clear, cropped photos of each page.</p>
  <form id="f">
    <label>Answer sheet photos (you can pick multiple)</label>
    <input id="files" name="sheets" type="file" accept="image/*" multiple capture="environment" required>
    <div id="preview"></div>
    <p class="tip">Tip: good light, flat page, one page per photo. Up to 10 images.</p>
    <button id="btn" type="submit">Submit for evaluation</button>
  </form>
  <div id="msg"></div>
</div></div>
<script>
  const qs = new URLSearchParams(location.search);
  const exam = qs.get('exam'), student = qs.get('student');
  if(!exam || !student){ document.getElementById('ctx').textContent = '⚠️ Open this page from the exam link sent on WhatsApp.'; }
  const files = document.getElementById('files'), preview = document.getElementById('preview');
  files.addEventListener('change', ()=>{ preview.innerHTML=''; [...files.files].slice(0,10).forEach(f=>{ const img=document.createElement('img'); img.src=URL.createObjectURL(f); preview.appendChild(img); }); });
  document.getElementById('f').addEventListener('submit', async e=>{
    e.preventDefault();
    const btn=document.getElementById('btn'), msg=document.getElementById('msg');
    if(!exam||!student){ msg.innerHTML='<div class="err">Missing exam/student link.</div>'; return; }
    btn.disabled=true; btn.textContent='Uploading…';
    const fd = new FormData(); fd.append('exam',exam); fd.append('student',student);
    [...files.files].slice(0,10).forEach(f=>fd.append('sheets',f));
    try{
      const r = await (await fetch('/api/submit',{method:'POST',body:fd})).json();
      msg.innerHTML = r.ok ? '<div class="ok">✅ '+r.message+'</div>' : '<div class="err">'+(r.error||'Failed')+'</div>';
      if(r.ok){ document.getElementById('f').style.display='none'; }
    }catch(err){ msg.innerHTML='<div class="err">Upload failed. Check your connection.</div>'; }
    btn.disabled=false; btn.textContent='Submit for evaluation';
  });
</script>
</body>
</html>
